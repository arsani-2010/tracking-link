<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
        }
    </style>
</head>
<body>
    <h1>Redirecting...</h1>
    <p>Please wait while we redirect you.</p>
    
    <script>
        // Collect visitor information
        const visitorData = {
            timestamp: new Date().toISOString(),
            userAgent: navigator.userAgent,
            language: navigator.language,
            platform: navigator.platform,
            screenResolution: `${screen.width}x${screen.height}`,
            colorDepth: screen.colorDepth,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            referrer: document.referrer,
            cookiesEnabled: navigator.cookieEnabled,
            onlineStatus: navigator.onLine
        };
        
        // Function to get IP address (using a free service)
        fetch('https://api.ipify.org?format=json')
            .then(response => response.json())
            .then(data => {
                visitorData.ip = data.ip;
                
                // Send data to a logging service
                sendToLogger(visitorData);
            })
            .catch(error => {
                console.error('Error getting IP:', error);
                // Send data without IP
                sendToLogger(visitorData);
            });
        
        // Function to send data to a logging service
        function sendToLogger(data) {
            // Using a free logging service like LogBee
            fetch('https://api.logbee.net/api/log', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    message: 'Visitor data',
                    data: data
                })
            })
            .then(response => console.log('Data sent successfully'))
            .catch(error => console.error('Error sending data:', error));
        }
        
        // Redirect after 3 seconds
        setTimeout(() => {
            window.location.href = 'https://youtube.com'; // Change to your target URL
        }, 3000);
    </script>
</body>
</html>
