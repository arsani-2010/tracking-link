<!DOCTYPE html>
<html>
<head>
    <title>Loading...</title>
</head>
<body>
    <h1>Please wait...</h1>
    <p>You will be redirected shortly.</p>
    
    <script>
        // Get basic visitor info
        var visitorInfo = {
            time: new Date().toString(),
            page: window.location.href,
            referrer: document.referrer,
            browser: navigator.userAgent
        };
        
        // Send info to a simple logger
        var img = new Image();
        img.src = "https://webhook.site/c015f400-dc65-4bbb-a08f-f309961c495f" + encodeURIComponent(JSON.stringify(visitorInfo));
        
        // Redirect after 2 seconds
        setTimeout(function() {
            window.location.href = "https://youtube.com";
        }, 2000);
    </script>
</body>
</html>
